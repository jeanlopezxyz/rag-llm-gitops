# Default values for rag-llm-mcp-graph-server
replicaCount: 1

image:
  repository: quay.io/ecosystem-appeng/rag-llm-mcp-graph-server
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Environment variables
env:
  MCP_TRANSPORT: "http"
  MCP_GRAPH_HOST: "0.0.0.0"
  MCP_GRAPH_PORT: "8000"
  NEO4J_URI: "bolt://neo4j.rag-llm.svc.cluster.local:7687"
  NEO4J_USER: "neo4j"

# Secrets
secrets:
  externalSecret:
    enabled: true
    name: mcp-graph-server-secret
    backend: vault
    key: secret/data/hub/mcp-graph-server

# Health checks
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5