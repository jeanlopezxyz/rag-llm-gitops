# Default values for rag-llm-mcp-vector-server
replicaCount: 1

image:
  repository: quay.io/ecosystem-appeng/rag-llm-mcp-vector-server
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Environment variables
env:
  MCP_TRANSPORT: "http"
  MCP_VECTOR_HOST: "0.0.0.0"
  MCP_VECTOR_PORT: "8000"
  PGVECTOR_HOST: "vectordb-rw.rag-llm.svc.cluster.local"
  PGVECTOR_PORT: "5432"
  PGVECTOR_DB: "vectordb"
  PGVECTOR_USER: "vectoruser"
  PGVECTOR_PASSWORD: "vectorpass"

# Health checks
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5