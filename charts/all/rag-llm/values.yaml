global:
  localClusterDomain: example.com
  hubClusterDomain: example.com
  db:
    index: docs
    type: EDB
  model:
    modelId: ibm-granite/granite-3.3-8b-instruct
llmui:
  namespace: "rag-llm"

replicaCount: 1

image:
  repository: "quay.io/ecosystem-appeng/rag-llm-ui"
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.1"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# --- INICIO DE LA MODIFICACIÓN ---
# Configuración de Istio
istio:
  authorizationPolicy:
    enabled: true
  peerAuthentication:
    enabled: true
  sidecarInjection:
    enabled: true

# Habilitar inyección de sidecar en el pod
podAnnotations:
  sidecar.istio.io/inject: "true"
  sidecar.istio.io/rewriteAppHTTPProbers: "true"
# --- FIN DE LA MODIFICACIÓN ---
podLabels: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 7860
  metricsPort: 8000

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: "2"
    memory: 2Gi
  requests:
    cpu: "1"
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /queue/status
    port: http
    scheme: HTTP
  timeoutSeconds: 8
  periodSeconds: 100
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /queue/status
    port: http
    scheme: HTTP
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 30
  successThreshold: 1
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /queue/status
    port: http
    scheme: HTTP
  timeoutSeconds: 1
  periodSeconds: 30
  successThreshold: 1
  failureThreshold: 24

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes:
  - name: providerconfig
    configMap:
      name: providerconfig
      defaultMode: 420
  - name: redis-schema
    configMap:
      name: redis-schema
      items:
        - key: redis_schema.yaml
          path: redis_schema.yaml
      defaultMode: 420
  - name: cache-volume
    emptyDir:
      sizeLimit: 5Gi
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - name: providerconfig
    mountPath: /app-root/config
  - name: redis-schema
    mountPath: /opt/app-root/src/redis_schema.yaml
    subPath: redis_schema.yaml
  - name: cache-volume
    mountPath: /opt/app-root/src/assets/proposal-docs
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%
    maxSurge: 1

route:
  enabled: true
  name: llm-ui
  portName: http
  labels:
  annotations:
  # path: /

populateDbJob:
  ## Job image - ⚠️ ACTUALIZA CON TU IMAGEN PERSONALIZADA ⚠️
  image:
    repository: "quay.io/jealopez/event-embeddings-generator" # <-- CAMBIA ESTO POR TU IMAGEN
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  command: ["/usr/bin/bash", "/app/entrypoint.sh"]
  #args: ["echo 'consuming a message'; sleep 5"]

  ## Define env
  # env:

  ## Job configurations
  backoffLimit: 10
  restartPolicy: Never

  doc_git_repo: https://github.com/RHEcosystemAppEng/llm-on-openshift.git
  doc_location: examples/notebooks/langchain/rhods-doc
  doc_dir: /docs

  # ===== AGREGAR ESTOS CAMPOS NUEVOS =====
  # Configuración del modelo de embeddings
  embeddingModel: "all-MiniLM-L6-v2" # Puedes cambiar a otro modelo como "all-mpnet-base-v2"
  batchSize: 100 # Tamaño del batch para procesar embeddings

  # By default, fullname uses '{{ .Release.Name }}-{{ .Chart.Name }}'. This
  # overrides that and uses the given string instead.
  # fullnameOverride: "some-name"

  # This adds a prefix
  # fullnamePrefix: "pre-"
  # This appends a suffix
  # fullnameSuffix: "-suf"

  annotations: {}

  ## define resources - ⚠️ DESCOMENTA Y AJUSTA SEGÚN TU NECESIDAD ⚠️
  resources:
    limits:
      cpu: 2
      memory: 4Gi # Aumentado para procesamiento de embeddings
    requests:
      cpu: 1
      memory: 2Gi

  securityContext:
    runAsUser:
    runAsGroup:
    fsGroup:

  volumeMounts:
    - mountPath: /cache/
      name: cache-volume
    - mountPath: /docs/
      name: doc-volume

  volumes:
    - name: cache-volume
      emptyDir:
        sizeLimit: 5Gi
    - name: doc-volume
      emptyDir:
        sizeLimit: 5Gi

secretStore:
  name: vault-backend
  kind: ClusterSecretStore

hfmodel:
  key: secret/data/hub/hfmodel

# Create NetworkPolicy to allow traffic from all namespaces to allow monitoring. Set to false if monitoring is not needed
customnetworkpolicy:
  enabled: true

# ===== NUEVA SECCIÓN: Source PostgreSQL Database =====
# Configuración de la base de datos PostgreSQL de origen
source-db:
  enabled: true
  clusterName: source-postgres
  replicaCount: 1
  database: sourcedb
  username: sourceuser
  # password: ""  # Si está vacío, se generará automáticamente

  postgresql:
    parameters:
      {}
      # log_statement: "all"
      # log_connections: "on"

  storage:
    size: 5Gi
    # storageClass: ""  # Deja vacío para usar el StorageClass por defecto
    # Si tienes un StorageClass específico, descomenta y especifica:
    # storageClass: "gp3-csi"  # para AWS
    # storageClass: "managed-csi"  # para Azure
    # storageClass: "standard-csi"  # para GCP

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1"

  # SQL personalizado para inicialización (opcional)
  initSQL:
    []
    # - "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
    # - "CREATE EXTENSION IF NOT EXISTS btree_gin;"

# ===== NUEVA SECCIÓN: Configuración de conexión para el Job =====
sourceDb:
  enabled: true # Cambiar a false si quieres usar el comportamiento original (git docs)
  host: "source-postgres-rw" # Service name for the source database
  port: 5432
  database: "sourcedb"
  credentialsSecret: "source-postgres-app"
